<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>딸박사 전용 파밍 머신</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>야짤 간편 검색 머신</h1>
      <p class="by">&lt;개발요청자 : <strong>딸박사</strong>&gt; &nbsp;&nbsp; Ver-<span id="ver">7.5</span></p>
    </header>

    <section class="card">
      <h2>조회수 상위 기준</h2>
      <div id="periods" class="chips"></div>

      <div id="rangeBox" class="range-box" hidden>
        <div class="range-row">
          <label>
            시작
            <select id="fromYear"></select>
            <select id="fromMonth"></select>
          </label>
          <span class="range-tilde">~</span>
          <label>
            끝
            <select id="toYear"></select>
            <select id="toMonth"></select>
          </label>
        </div>
        <p id="rangeHint" class="range-hint"></p>
      </div>
    </section>

    <section class="card">
      <h2>종류 필터</h2>
      <div id="typeFilters" class="chips">
        <button type="button" class="chip on" data-type="gif" id="filterGif">움짤</button>
        <button type="button" class="chip on" data-type="photo" id="filterPhoto">사진</button>
      </div>
    </section>

    <div class="actions">
      <button id="searchBtn" class="primary" type="button">검색</button>
      <button id="stopBtn" class="stop" type="button" disabled>중지</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>
    <section id="gallery" class="gallery" aria-label="사진"></section>
  </div>

  <!-- 검색중 / 더보기 / 추가검색 단일 하단 버튼 -->
  <button id="footerAction" class="footer-action" type="button" hidden aria-live="polite">검색중(0/30)</button>

  <div id="lightbox" class="lightbox" hidden>
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="닫기">×</button>
    <img id="lightboxImg" alt="" />
  </div>

  <script src="app.js"></script>
</body>
</html>
