<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>야짤검색기 — 제작자 김범수</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <p class="badge">FOR FRIENDS · JOKE TOOL</p>
      <h1>야짤검색기</h1>
      <p class="by">제작자 <strong>김범수</strong></p>
      <p class="desc">한국 커뮤니티에서 JPG만 모아서 한눈에 보여줌 ㅋㅋ</p>
    </header>

    <section class="card">
      <h2>1. 카테고리</h2>
      <div id="cats" class="chips"></div>
    </section>

    <section class="card">
      <h2>2. 커뮤니티</h2>
      <div id="sources" class="chips sources"></div>
    </section>

    <section class="card">
      <h2>3. 추가 키워드 (선택)</h2>
      <input id="title" type="text" placeholder="예: 옆집 아줌마, 오피스룩..." />
    </section>

    <div class="actions">
      <button id="searchBtn" class="primary" type="button">JPG 긁어오기</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>

    <section id="gallery" class="gallery" aria-label="검색 결과"></section>

    <footer>
      <p>제작자 김범수 · 한국 커뮤니티 검색 결과 JPG 모아보기</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
